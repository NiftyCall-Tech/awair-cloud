<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Awair Cloud">
  <rect width="32" height="32" rx="8" fill="#111317"/>
  <!-- gauge track (upper semicircle) -->
  <path
    d="M 7 22 A 9 9 0 0 1 25 22"
    fill="none"
    stroke="#2a2d32"
    stroke-width="2.5"
    stroke-linecap="round"
  />
  <!-- active arc ~65% -->
  <path
    d="M 7 22 A 9 9 0 0 1 25 22"
    fill="none"
    stroke="#22c55e"
    stroke-width="2.5"
    stroke-linecap="round"
    pathLength="100"
    stroke-dasharray="65 100"
  />
  <!-- score dot -->
  <circle cx="16" cy="14" r="2.25" fill="#4ade80"/>
</svg>
